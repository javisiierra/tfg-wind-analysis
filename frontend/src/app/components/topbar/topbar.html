<header class="topbar">
  <div class="brand">
    <h1>Wind Analysis GIS</h1>
    <p>Preparación automática de entradas para WindNinja</p>
  </div>

  <div class="actions">
    <input [(ngModel)]="casePath" placeholder="Ruta de la carpeta del caso" />
    <button (click)="runBase()" [disabled]="loading">
      {{ loading ? 'Ejecutando...' : 'Run Base' }}
    </button>
  </div>
</header>

<div *ngIf="statusText" class="status-box" [class.error-box]="!!error" [class.success-box]="!!result && !error">
  {{ statusText }}
</div>

<details *ngIf="result" class="details-box">
  <summary>Ver detalle de salida</summary>
  <pre>{{ result | json }}</pre>
</details>

<details *ngIf="error" class="details-box error-box">
  <summary>Ver detalle del error</summary>
  <pre>{{ error | json }}</pre>
</details>
