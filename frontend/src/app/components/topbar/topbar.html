<div class="topbar">
  <div class="brand">
    <div class="brand-icon">🌬️</div>

    <div class="brand-text">
      <h1>WindNinja Input Builder</h1>
      <span>Preparación Web-GIS de entradas geoespaciales</span>
    </div>
  </div>

  <div class="case-control">
    <input
      [ngModel]="casePath"
      placeholder="Selecciona una carpeta permitida"
      title="Ruta del caso seleccionado dentro de HOST_CASES_ROOT"
      readonly
    />

    <button class="btn secondary" (click)="selectFolder()" [disabled]="loading || isExecutionRunning">
      Seleccionar carpeta
    </button>

    <button class="btn primary" (click)="prepareCase()" [disabled]="loading || isExecutionRunning || !casePath">
      Importar carpeta
    </button>

    <button class="btn primary" (click)="executePreparationPipeline()" [disabled]="loading || isExecutionRunning || !casePath">
      Ejecutar preparación
    </button>
  </div>
</div>
